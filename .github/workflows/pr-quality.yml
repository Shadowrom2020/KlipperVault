name: PR Quality

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: pr-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest packaging

      - name: Ruff lint
        run: ruff check .

      - name: MyPy type check
        env:
          PYTHONPATH: src
        run: mypy src klipper_vault.py --ignore-missing-imports

      - name: Python compile check
        run: python -m py_compile klipper_vault.py src/*.py

      - name: i18n artifact parity
        run: |
          make i18n
          # --ignore-matching-lines skips hunks where all changed lines match the
          # pattern, which handles the volatile POT-Creation-Date timestamp header.
          git diff --ignore-matching-lines='"POT-Creation-Date:' --exit-code \
            -- 'src/locales/*/LC_MESSAGES/klippervault.po' || {
            echo "Translation catalogs are out of date. Run 'make i18n' and commit updated files.";
            exit 1;
          }

      - name: GPLv3 license compatibility check
        run: python scripts/check_gplv3_compatibility.py

      - name: Pytest
        env:
          PYTHONPATH: src
        run: |
          if python - <<'PY'
          from pathlib import Path
          has_tests = any(Path("tests").rglob("*.py")) or any(Path('.').glob('test_*.py'))
          raise SystemExit(0 if has_tests else 1)
          PY
          then
            pytest -q
          else
            echo "No test files found; skipping pytest."
          fi
