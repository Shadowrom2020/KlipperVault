name: PR Quality

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: pr-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt

      - name: Ensure CI parity script is executable
        run: |
          chmod +x scripts/ci_parity.sh

      - name: Run quality parity checks
        env:
          PYTHON_BIN: python3
        run: |
          ./scripts/ci_parity.sh --quality
