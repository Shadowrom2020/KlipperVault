name: Build Executables

on:
  workflow_dispatch:

concurrency:
  group: build-executables-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  package:
    name: Package ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            label: Linux
            platform: linux-x64
            python: "3.13"
          - runner: windows-latest
            label: Windows
            platform: windows-x64
            python: "3.13"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: "requirements*.txt"

      - name: Install build dependencies
        run: python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Build standalone executable
        run: python scripts/build_executable.py

      - name: Install AppImage tool (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -qq appimage-builder || true
          if ! command -v appimagetool &> /dev/null; then
            wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
            chmod +x appimagetool-x86_64.AppImage
            sudo mv appimagetool-x86_64.AppImage /usr/local/bin/appimagetool
          fi
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"

      - name: Archive packaged executable
        run: python scripts/package_executable_artifact.py --platform ${{ matrix.platform }}

      - name: Build Linux AppImage installer (Linux only)
        if: runner.os == 'Linux'
        run: python scripts/build_appimage_installer.py
        continue-on-error: true

      - name: Build Windows installer (Windows only)
        if: runner.os == 'Windows'
        run: |
          # Install Inno Setup if not already present
          # NOTE: choco does not refresh the current session's PATH, so we
          # cannot gate on Get-Command iscc after installation. The Python
          # script searches known installation paths directly.
          if (!(Get-Command iscc -ErrorAction SilentlyContinue)) {
            choco install innosetup --yes
          }
          python scripts/build_msi_installer.py
        shell: pwsh
        continue-on-error: true

      - name: Smoke test packaged executable
        run: python scripts/test_packaged_executable.py
        continue-on-error: true

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v6
        with:
          name: KlipperVault-${{ matrix.platform }}
          path: release/**/*
          if-no-files-found: warn

  publish-release:
    name: Publish release assets
    if: startsWith(github.ref, 'refs/tags/')
    needs: package
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets
          pattern: KlipperVault-*
          merge-multiple: true

      - name: Publish release asset bundle
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          files: release-assets/**/*
