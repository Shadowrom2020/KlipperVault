name: Security

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "27 3 * * 1"
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scans:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt

      - name: Ensure CI parity script is executable
        run: |
          chmod +x scripts/ci_parity.sh

      - name: Run security parity checks
        env:
          PYTHON_BIN: python3
        run: |
          ./scripts/ci_parity.sh --security
