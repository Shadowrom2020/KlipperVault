services:
  klippervault:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: klippervault
    restart: unless-stopped
    environment:
      KLIPPERVAULT_AUTO_UPDATE_VENV: "0"
      KLIPPERVAULT_SERVER_MODE: "1"
    ports:
      - "10090:10090"
    volumes:
      - klippervault_config:/home/klippervault/.config/klippervault
      - klippervault_db:/home/klippervault/.local/share/klippervault
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:10090', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  klippervault_config:
  klippervault_db:
